<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" role="img" aria-labelledby="pathway-title pathway-desc">
  <title id="pathway-title">Post-Secondary Pathway Map</title>
  <desc id="pathway-desc">Visual map showing four pathways from high school: four-year college, community college, workforce and certifications, and military service.</desc>
  <defs>
    <filter id="ps" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="900" height="400" fill="#f7f9fb" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#1a4d6e">Your Pathways After High School</text>
  <text x="450" y="58" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#5a6c7d">Multiple valid routes - choose what fits your goals, values, and circumstances</text>

  <circle cx="450" cy="200" r="55" fill="#1a4d6e" filter="url(#ps)"/>
  <text x="450" y="195" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fff">High School</text>
  <text x="450" y="212" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fff">Graduate</text>

  <line x1="395" y1="160" x2="180" y2="100" stroke="#c45c26" stroke-width="3"/>
  <rect x="60" y="60" width="200" height="90" rx="10" fill="#fff" stroke="#c45c26" stroke-width="2"/>
  <text x="160" y="90" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#1a4d6e">4-Year College</text>
  <text x="160" y="110" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5a6c7d">Bachelor&apos;s degree</text>
  <text x="160" y="128" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5a6c7d">Research universities, liberal arts</text>

  <line x1="395" y1="180" x2="180" y2="200" stroke="#2d6a8f" stroke-width="3"/>
  <rect x="60" y="165" width="200" height="90" rx="10" fill="#fff" stroke="#2d6a8f" stroke-width="2"/>
  <text x="160" y="195" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#1a4d6e">Community College</text>
  <text x="160" y="215" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5a6c7d">Associate degree or transfer</text>
  <text x="160" y="233" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5a6c7d">Affordable, flexible, local</text>

  <line x1="505" y1="180" x2="720" y2="200" stroke="#2d7a4f" stroke-width="3"/>
  <rect x="640" y="165" width="200" height="90" rx="10" fill="#fff" stroke="#2d7a4f" stroke-width="2"/>
  <text x="740" y="195" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#1a4d6e">Workforce &amp; Certs</text>
  <text x="740" y="215" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5a6c7d">Apprenticeships, trade schools</text>
  <text x="740" y="233" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5a6c7d">Earn while you learn</text>

  <line x1="505" y1="160" x2="720" y2="100" stroke="#6b4c9a" stroke-width="3"/>
  <rect x="640" y="60" width="200" height="90" rx="10" fill="#fff" stroke="#6b4c9a" stroke-width="2"/>
  <text x="740" y="90" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#1a4d6e">Military Service</text>
  <text x="740" y="110" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5a6c7d">Training, GI Bill benefits</text>
  <text x="740" y="128" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5a6c7d">Leadership &amp; technical skills</text>

  <line x1="450" y1="255" x2="450" y2="310" stroke="#5a6c7d" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="350" y="310" width="200" height="60" rx="8" fill="#fff" stroke="#5a6c7d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="450" y="335" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#5a6c7d">Gap Year / Still Exploring</text>
  <text x="450" y="355" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5a6c7d">That&apos;s okay - use this site to plan</text>

  <text x="450" y="390" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#5a6c7d" font-style="italic">Original pathway map - Pathways Forward Career Center</text>
</svg>
